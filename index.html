<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景翔 & 佳柔 婚禮電子喜帖</title>
  <meta name="description" content="誠摯邀請您蒞臨見證景翔與佳柔的婚禮時刻。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="site-shell">
    <section class="hero fade-section" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-kicker">Wedding Invitation</p>
        <p class="hero-message">誠摯邀請您蒞臨見證</p>
        <h1 class="hero-title">
          <span id="groom-name">景翔</span>
          <span class="ampersand">&amp;</span>
          <span id="bride-name">佳柔</span>
        </h1>
        <p class="hero-date" id="hero-date">2026.12.12</p>
      </div>
    </section>

    <section class="section invitation-section fade-section" aria-labelledby="invitation-title">
      <div class="section-heading centered-heading">
        <p class="eyebrow">Invitation</p>
        <h2 id="invitation-title">誠摯邀請</h2>
      </div>
      <div class="card invitation-card">
        <p id="invitation-message-line1">感謝您一路以來的陪伴與祝福。</p>
        <p id="invitation-message-line2">我們將於這一天攜手步入人生新的旅程，</p>
        <p id="invitation-message-line3">誠摯邀請您蒞臨，與我們一同分享這份喜悅。</p>
      </div>
    </section>

    <section class="section photo-section fade-section" aria-labelledby="gallery-title">
      <div class="section-heading centered-heading">
        <p class="eyebrow">Memories</p>
        <h2 id="gallery-title">婚紗照</h2>
      </div>
      <div class="carousel" id="carousel" aria-label="婚紗照輪播">
        <div class="carousel-track" id="carousel-track"></div>
        <div class="carousel-controls">
          <button class="carousel-btn" id="prev-btn" type="button" aria-label="上一張">‹</button>
          <div class="carousel-dots" id="carousel-dots" aria-label="輪播頁籤"></div>
          <button class="carousel-btn" id="next-btn" type="button" aria-label="下一張">›</button>
        </div>
      </div>
    </section>

    <section class="section info-section fade-section" aria-labelledby="info-title">
      <div class="section-heading centered-heading">
        <p class="eyebrow">Wedding Info</p>
        <h2 id="info-title">婚禮資訊</h2>
      </div>
      <div class="card info-grid">
        <article class="info-item">
          <h3>日期</h3>
          <p id="info-date"></p>
        </article>
        <article class="info-item">
          <h3>時間</h3>
          <p id="info-time"></p>
          <p class="sub-info" id="info-arrival-note"></p>
        </article>
        <article class="info-item">
          <h3>地點</h3>
          <p id="info-venue"></p>
        </article>
        <article class="info-item info-item-address">
          <h3>地址</h3>
          <p id="info-address"></p>
        </article>
      </div>
    </section>

    <section class="section map-section fade-section" aria-labelledby="map-title">
      <div class="section-heading centered-heading">
        <p class="eyebrow">Map</p>
        <h2 id="map-title">地圖導航</h2>
      </div>
      <div class="card map-card">
        <p id="map-description-line1">點擊下方按鈕即可開啟 Google 地圖導航。</p>
        <p id="map-description-line2">建議提早出發，預留交通與停車時間。</p>
        <button class="map-button" id="map-button" type="button">開啟 Google 地圖</button>
      </div>
    </section>

    <section class="section reminder-section fade-section" aria-labelledby="reminder-title">
      <div class="section-heading centered-heading">
        <p class="eyebrow">Reminder</p>
        <h2 id="reminder-title">當日提醒</h2>
      </div>
      <div class="card reminder-card">
        <ul class="reminder-list" id="reminder-list"></ul>
      </div>
    </section>
  </main>

  <footer class="footer fade-section">
    <p id="footer-invite">景翔 & 佳柔 敬邀</p>
  </footer>

  <audio id="bgm-audio" preload="none" loop>
    <source src="assets/music/bgm.mp3" type="audio/mpeg">
  </audio>

  <button class="music-toggle" id="music-toggle" type="button" aria-label="播放背景音樂" aria-pressed="false">♫</button>

  <script id="embedded-wedding-data" type="application/json">
    {
      "groom": "景翔",
      "bride": "佳柔",
      "hero_message": "誠摯邀請您蒞臨見證",
      "date": "2026-12-12",
      "time": "12:00 開席",
      "arrival_note": "建議 11:30 入場",
      "venue": "桃園八德彭園",
      "address": "334桃園市八德區介壽路一段728號3樓",
      "map_link": "https://maps.app.goo.gl/kJ4QmBb84BgEKgTTA",
      "invitation_message": [
        "感謝您一路以來的陪伴與祝福。",
        "我們將於這一天攜手步入人生新的旅程，",
        "誠摯邀請您蒞臨，與我們一同分享這份喜悅。"
      ],
      "map_description": [
        "點擊下方按鈕即可開啟 Google 地圖導航。",
        "建議提早出發，預留交通與停車時間。"
      ],
      "reminders": [
        "建議提前 10 至 15 分鐘抵達",
        "現場提供地下停車位",
        "敬請準時入席"
      ],
      "note": "敬請準時入席"
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
